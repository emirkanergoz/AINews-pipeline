version: '3.8'

services:
  # 1. Veritabanı Servisi (PostgreSQL)
  db:
    image: postgres:15
    container_name: ainews_db
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: ainews
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # 2. Web Uygulaması Servisi (FastAPI)
  web:
    build: .
    container_name: ainews_web
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://user:pass@db:5432/ainews
    depends_on:
      - db

volumes:
  postgres_data: