<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI News - Professional Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .news-card { transition: transform 0.2s; border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .news-card:hover { transform: translateY(-5px); }
        .navbar { background: #1a1a1a; }
    </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">🚀 AI News Pipeline</a>
    </div>
</nav>

<div class="container">
    <div class="row mb-4">
        <div class="col">
            <h2>Latest Technology News <span class="badge bg-primary">{{ count }}</span></h2>
            <p class="text-muted">Live data from Webrazzi</p>
        </div>
    </div>

    <div class="row g-4">
        {% for news in news_list %}
        <div class="col-md-4">
            <div class="card h-100 news-card">
                <div class="card-body">
                    <h5 class="card-title text-dark">{{ news.title }}</h5>
                    <p class="card-text text-secondary small">Source: {{ news.source }}</p>
                </div>
                <div class="card-footer bg-white border-0">
                    <small class="text-muted">Scraped at: {{ news.scraped_at }}</small>
                </div>
            </div>
        </div>
        {% endfor %}
    </div>
</div>

</body>
</html>
